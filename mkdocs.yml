site_name: PyPSA-IEI Documentation
repo_url: https://github.com/open-energy-transition/PyPSA-IEI
theme:
  name: material
  font:
    text: Nunito
    code: Roboto Mono
  features:
  - content.code.copy

markdown_extensions:
- admonition
- pymdownx.details
- pymdownx.superfences
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.tabbed:
    alternate_style: true
- tables

extra_css:
- assets/css/custom.css
- https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap
- https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap

plugins:
- search
- to-pdf:
    enabled_if_env: BUILD_PDF
    author: Open Energy Transition
    cover_title: PyPSA-IEI Documentation
    cover_subtitle: Integrated Energy Infrastructure Model
    output_path: pdf/pypsa-iei-documentation.pdf
    download_link: header
    toc_level: 3

nav:
- 🏠 Home: index.md
- 🚀 Installation: installation.md
- 🎯 Scenarios: scenarios.md
- ⚙️ Model Functionality:
  - Overview: functionality/index.md
  - 📐 Parameters & Configuration:
    - Costs: functionality/costs.md
    - Lifetimes: functionality/lifetimes.md
    - Losses: functionality/losses.md
    - Flexible Time Segmentation: functionality/time_segmentation.md
  - 🔌 Network Infrastructure:
    - Gas Networks: functionality/gas.md
    - Hydrogen Networks: functionality/hydrogen.md
    - CO₂ Pipeline Network: functionality/co2_pipeline.md
    - TYNDP Electricity Projects: functionality/electricity.md
    - National Grid Plans: functionality/national_grid_plans.md
    - Import Infrastructure Retrofitting: functionality/import_retrofit.md
  - 📈 Demand & Supply:
    - Industrial Demand: functionality/industry.md
    - Energy Imports: functionality/imports.md
  - ⚖️ Solver Constraints:
    - Self-Sufficiency Constraints: functionality/self_sufficiency.md
    - Overall Minimum Capacities: functionality/overall_min_capacities.md
    - Capacity Reserve Margin: functionality/capacity_reserve.md
    - Expansion Limits: functionality/expansion.md
  - 🎯 Optimization Settings:
    - Myopic Optimization: functionality/myopic.md
    - Curtailment Mode: functionality/curtailment_load_shedding.md
- 📊 Post-Analysis:
  - Overview: analysis/index.md
  - System Costs: analysis/costs.md
  - Energy Balance: analysis/balances.md
  - KPIs: analysis/kpis.md
  - Exogenous Demand: analysis/exogenous_demand.md
  - Imports: analysis/imports.md
  - Self-Sufficiency: analysis/self_sufficiency.md
  - Balance Maps: analysis/balance_maps.md
  - Network Maps: analysis/networks.md
  - Gas Pipeline Utilization: analysis/utilization.md
- 📝 Release Notes: release_notes.md
- 🆘 Support: support.md
