site_name: PyPSA-IEI Documentation
repo_url: https://github.com/open-energy-transition/PyPSA-IEI
theme:
  name: material
  font:
    text: Nunito
    code: Roboto Mono
  features:
  - navigation.sections
  - navigation.expand
  - content.code.copy

markdown_extensions:
- admonition
- pymdownx.details
- pymdownx.superfences
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- tables

extra_css:
- assets/css/custom.css
- https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap
- https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap

plugins:
- search
- to-pdf:
    enabled_if_env: BUILD_PDF
    author: Open Energy Transition
    cover_title: PyPSA-IEI Documentation
    cover_subtitle: Integrated Energy Infrastructure Model
    output_path: pdf/pypsa-iei-documentation.pdf
    download_link: header
    toc_level: 3

nav:
- 🏠 Home: index.md
- 🚀 Installation: installation.md
- ⚙️ Model Functionality:
  - Overview: functionality/index.md
  - Costs: functionality/costs.md
  - Lifetimes: functionality/lifetimes.md
  - Gas: functionality/gas.md
  - Hydrogen: functionality/hydrogen.md
  - Industrial Demand: functionality/industry.md
  - Imports: functionality/imports.md
  - Losses: functionality/losses.md
  - Electricity Network: functionality/electricity.md
  - Myopic Optimization: functionality/myopic.md
  - Expansion Limits: functionality/expansion.md
- 📊 Post-Analysis:
  - Overview: analysis/index.md
  - System Costs: analysis/costs.md
  - Energy Balance: analysis/balances.md
  - KPIs: analysis/kpis.md
  - Exogenous Demand: analysis/exogenous_demand.md
  - Imports: analysis/imports.md
  - Self-Sufficiency: analysis/self_sufficiency.md
  - Balance Maps: analysis/balance_maps.md
  - Network Maps: analysis/networks.md
  - Gas Pipeline Utilization: analysis/utilization.md
- 📝 Release Notes: release_notes.md
